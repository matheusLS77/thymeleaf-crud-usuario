<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">
            <img src="https://flaticons.net/icon.php?slug_category=people&slug_icon=user-group" alt="Logo" width="30" height="24" class="d-inline-block align-text-top mt-1 me-1"> Menu
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto nav-underline">
                <li class="nav-item">
                    <a class="nav-link text-light-emphasis" aria-current="page" th:href="@{/home}">Início</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-light-emphasis" th:href="@{/usuariolista}">Usuários</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-light-emphasis" th:href="@{/login}">Sair</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="p-5 mb-4 bg-light  rounded-3">
        <div class="container-fluid py-3">
            <h1 class="display-5 fw-bold alert alert-success" role="alert" th:if="${usuario}" th:text="${usuario}">Bem-vindo ao sistema</h1>

            <p class="col-md-8 fs-4 mb-4">Página inicial simples feita com Spring Boot, Thymeleaf e Bootstrap.</p>
            <a class="btn btn-primary btn-lg" th:href="@{/usuarios}">Acessar usuários</a>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
