<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">
            <img src="https://flaticons.net/icon.php?slug_category=people&slug_icon=user-group" alt="Logo" width="30" height="24" class="d-inline-block align-text-top mt-1 me-1"> Menu
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto nav-underline">
                <li class="nav-item">
                    <a class="nav-link text-light-emphasis" aria-current="page" th:href="@{/home}">Início</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-light-emphasis" th:href="@{/usuariolista}">Produtos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-light-emphasis" th:href="@{/login}">Sair</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1">Produtos</h1>
            <p class="text-secondary mb-0">Lista de produtos cadastrados.</p>
        </div>

        <a class="btn btn-primary" th:href="@{/produtocadastrar}">Novo usuário</a>
    </div>

    <div class="alert alert-success" role="alert" th:if="${mensagem}" th:text="${mensagem}">
        Produto salvo com sucesso.
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead class="table-primary">
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Nome</th>
                        <th scope="col">Descrição</th>
                        <th scope="col">Preço</th>
                        <th scope="col">Estoque</th>
                        <th scope="col" class="text-end">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="produto : ${produtos}">
                        <td th:text="${produto.id}">1</td>
                        <td th:text="${produto.nome}">nome</td>
                        <td th:text="${produto.descricao}">descricao</td>
                        <td th:text="${produto.preco}">1</td>
                        <td th:text="${produto.estoque}">1</td>

                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary me-1" th:href="@{/produtoatualizar/{id}(id=${produto.id})}">Editar</a>
                            <button th:data-id="${produto.id}" class="excluirp btn btn-sm btn-outline-danger">Excluir</button>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(produtos)}">
                        <td colspan="4" class="text-center text-secondary py-4">Nenhum produto cadastrado.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="/excluir_produto.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
