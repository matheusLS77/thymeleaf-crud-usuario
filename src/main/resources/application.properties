spring.application.name=revisao2

# URL de conexao com o banco de dados MariaDB/MySQL.
# localhost = banco rodando na propria maquina
# 3306 = porta padrao do MariaDB/MySQL
# template = nome da base de dados criada
spring.datasource.url=jdbc:mysql://localhost:3306/revisao2

# Nome do usuario do banco de dados
spring.datasource.username=root

# Senha do usuario do banco de dados
spring.datasource.password=

# Driver JDBC usado para conectar no MariaDB/MySQL
# spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialeto do banco para o Hibernate gerar comandos SQL compativeis
# spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Define o comportamento da estrutura do banco
# update = cria ou atualiza tabelas automaticamente sem apagar os dados
spring.jpa.hibernate.ddl-auto=update

# Mostra no console os comandos SQL executados pela aplicacao
spring.jpa.show-sql=true

# Formata o SQL exibido no console para facilitar a leitura
spring.jpa.properties.hibernate.format_sql=true

